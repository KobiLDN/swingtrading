name: Update Prices

on:
  schedule:
    # 06:00 UTC daily (after London open)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests python-dotenv

      - name: Run price updater
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python update_prices.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices-data.js prices.json
          git diff --cached --quiet || git commit -m "Update prices — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
